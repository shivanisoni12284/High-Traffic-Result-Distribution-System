spring:
  application:
    name: high-traffic-result-distribution-system

  datasource:
    url: jdbc:postgresql://localhost:5432/high_traffic_result_distribution_system
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379



